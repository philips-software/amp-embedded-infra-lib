---
name: HIL Test

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  hil-test:
    name: HIL Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up HIL environment
        run: |
          chmod +x ./rpi/install/set_hil.sh
          ./rpi/install/set_hil.sh
