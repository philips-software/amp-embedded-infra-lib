mutators:
  - cxx_add_to_sub
excludePaths:
  - .*/_deps/.*
  - .*/external/.*
  - .*/googlemock/.*
  - .*/googletest/.*
  - .*/test_doubles/.*
  - .*/test_helper/.*
  - .*/test/.*
  - .*/MutationTestingTimeoutGuard.cpp # prevent mutating the timeout guard itself, which is the last line of defense against infinite loops
  - .*/HttpRequestParser.cpp # cxx_add_to_sub on loop increments causes unrecoverable infinite loops
  - .*/DnsResolver.cpp
  - .*/Http.cpp
  - .*/MdnsClient.cpp
  - .*/WebSocketClientConnectionObserver.cpp
  - .*/CyclicStore.cpp
  - .*/Asn1Formatter.cpp
