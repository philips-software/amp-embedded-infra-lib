syntax = "proto3";

import "EchoAttributes.proto";

package gap;
option java_package = "com.philips.emil.protobufEcho";
option java_outer_classname = "GapProto";

// ==================================================
// GAP COMMON
// ==================================================

message Address
{
    bytes address = 1 [(bytes_size) = 6];
}

message BoolValue
{
    bool value = 1;
}

message UInt32Value
{
    uint32 value = 1;
}

// Link layer states of a device in a Peripheral or Central role
// Peripheral role states are standby, connected and advertising.
// Central role states are standby, scanning, connected and initiating.
// Allowed transitions are as follows.
// 1. Every state can go to standby.
// 2. Every state can be entered from standby except the connected state.
// 3. Connected state can only be entered from advertising and initiating states.
// For further details refer to Section 1.1, BLUETOOTH CORE SPECIFICATION Version 5.3 | Vol 6, Part B
message State
{
    enum Event
    {
        standby = 0;
        scanning = 1;
        connected = 2;
        advertising = 3;
        initiating = 4;
    }
    Event value = 1;
}

message IoCapabilities
{
    enum IoCapabilitiesEnum
    {
        None = 0;
        Display = 1;
        DisplayYesNo = 2;
        Keyboard = 3;
        KeyboardDisplay = 4;
    }

    IoCapabilitiesEnum ioCaps = 1;
}

message SecurityLevel
{
    enum SecurityLevelEnum
    {
        None = 0;
        UnauthenticatedPairing = 1;
        AuthenticatedPairing = 2;
        AuthenticatedPairingWithLE = 3;
    }

    SecurityLevelEnum level = 1;
}

message AdvertisementType
{
    enum AdvertisementTypeEnum
    {
        AdvInd = 0;
        AdvNonconnInd = 1;
    }

    AdvertisementTypeEnum type = 1;
}

message AddressType
{
    enum AddressTypeEnum
    {
        publicAddress = 0;
        randomAddress = 1;
    }

    AddressTypeEnum type = 1;
}

message AddressWithType
{
    Address address = 1;
    AddressType addressType = 2;
}

message AdvertisingEventType
{
    enum AdvertisingEventTypeEnum
    {
        advInd = 0;
        advDirectInd = 1;
        advScanInd = 2;
        advNonconnInd = 3;
        scanResponse = 4;
    }

    AdvertisingEventTypeEnum type = 1;
}

message PairingStatus
{
    enum Error
    {
        passkeyEntryFailed = 0;
        authenticationRequirementsNotMet = 1;
        pairingNotSupported = 2;
        insufficientEncryptionKeySize = 3;
        numericComparisonFailed = 4;
        timeout = 5;
        encryptionFailed = 6;
        unknown = 7;
    }

    bool success = 1;
    Error error = 2; // Only set if not success
}

message BondsStatus
{
    uint32 currentBonds = 1;
    uint32 maxBonds = 2;
}

// ==================================================
// GAP DEVICE
// ==================================================

service GapDevice {
    option(service_id) = 36;

    // Called when the device started and the BLE is initialized
    rpc Initialized(Nothing) returns(Nothing) { option(method_id) = 1; }
}

// ==================================================
// GAP PERIPHERAL
// ==================================================

message AdvertisementMode
{
    AdvertisementType type = 1;
    uint32 advInterval = 2;
}

message AdvertisementData
{
    bytes data = 1 [(bytes_size) = 28]; 
}

message ScanResponseData
{
    bytes data = 1 [(bytes_size) = 13]; 
}

message SecurityPreference
{
    enum SupportEnum
    {
        disabled = 0;
        supported = 1;
        enforced = 2;
    }

    enum IoCapabilitiesEnum
    {   
        None = 0;
        Display = 1;
        DisplayYesNo = 2;
        Keyboard = 3;
        KeyboardDisplay = 4;
    }

    SupportEnum secureConnections = 1;
    SupportEnum mitm = 2;
    IoCapabilitiesEnum ioCapabilities = 3;
}

// ==================================================
// GAP PERIPHERAL SERVICE DEFINITION
// ==================================================
// State constraints:
//  Unless otherwise specified, all methods are allowed in all link layer states.
//  Non-conformance may cause undefined behavior
// Callback constraints:
//  Unless otherwise specified, methods do not by default result in any callbacks on the response service
//  When a callback is specified for a method and only for that method, another call of the same method is not allowed until the callback has been received.
//  When a callback is specified for more than one method, any of the associated method calls is not allowed until the callback for the previous call has been received
//  Non-conformance may cause undefined behavior
// ==================================================
service GapPeripheral
{
    option (service_id) = 32;

    // ==================================================
    // CORE FEATURE SET
    // All servers must implement these methods  
    // ==================================================

    // Results in GapPeripheralResponse.CurrentState with current state
    rpc GetState(Nothing) returns (Nothing) { option (method_id) = 1; }

    // Allowed in link layer states: standby
    // Results in GapPeripheralResponse.CurrentState with state advertising
    rpc Advertise(AdvertisementMode) returns (Nothing) { option (method_id) = 2; }

    // Allowed in link layer states: advertising, connected
    // Results in GapPeripheralResponse.CurrentState with state standby
    rpc Standby(Nothing) returns (Nothing) { option (method_id) = 3; }

    // Allowed in link layer states: standby
    // Formatting of advertisement data is as per Bluetooth Core Specification.
    // Maximum advertisement data length for this method is 28 bytes. Server reserves an additional 3 bytes for flags data with the flag bits 'LE General Discoverable Mode' and 'BR/EDR Not Supported' enabled.
    // Server will not check validity of the advertisement data and only maximum length of each field will be passed to BLE stack
    // If not set by this method, server will have as advertisement data only flags field.
    rpc SetAdvertisementData(AdvertisementData) returns (Nothing) { option (method_id) = 4; }

    // Allowed in link layer states: standby
    // Formatting of scan response data is as per Bluetooth Core Specification.
    // Maximum scan response length for this method is 13 bytes. Server reserves 18 bytes for streaming service uuids. Scan Response is only possible with scannable advertisements
    // Server will not check validity of the scan response data and only maximum length of each field will be passed to BLE stack
    // If not set by this method, server will have as scan response data only service uuids.
    rpc SetScanResponseData(ScanResponseData) returns (Nothing) { option (method_id) = 5; }
    
    // Allowed in link layer states: advertising
    // Results in GapPeripheralResponse.AdvertisingAddress
    // Type of the advertising address is statically configured. It is the same with Identity Address when privacy is 
    // not used and different otherwise.
    rpc GetAdvertisingAddress(Nothing) returns (Nothing) { option (method_id) = 6; }

    // Results in GapPeripheralResponse.IdentityAddress
    // Type of the identity address is statically configured
    rpc GetIdentityAddress(Nothing) returns (Nothing) { option (method_id) = 7; }

    // Allowed in link layer states: standby
    rpc SetSecurityPreferences(SecurityPreference) returns (Nothing) { option (method_id) = 8; }

    // Allowed in link layer states: standby
    // Default is to allow pairing
    rpc SetAllowPairing(BoolValue) returns (Nothing) { option (method_id) = 9; }

    // Allowed in link layer states: connected
    // Send a slave security request to the master.
    // This command has to be issued to notify the master of the security
    // requirements of the slave. The master may encrypt the link, initiate the
    // pairing procedure, or reject the request.
    rpc SendSecurityRequest(Nothing) returns (Nothing) { option (method_id) = 10; }

    // Allowed in link layer states: standby
    // Results in GapPeripheralResponse.NumberOfBondsChanged
    rpc RemoveAllBonds(Nothing) returns (Nothing) { option (method_id) = 11; }

    // Allowed in link layer states: standby
    // Results in GapPeripheralResponse.NumberOfBondsChanged
    // Oldest bond means the least recently used, i.e. connected, bonded peer.
    rpc RemoveOldestBond(Nothing) returns (Nothing) { option (method_id) = 12; }

    // Results in GapPeripheralResponse.BondInformation
    rpc GetBondInformation(Nothing) returns (Nothing) { option (method_id) = 13; }
}

service GapPeripheralResponse 
{
    option(service_id) = 34;

    // ==================================================
    // CORE FEATURE SET
    // All servers must implement these methods  
    // ==================================================

    // Default state after device start is standby
    rpc CurrentState(State) returns(Nothing) { option(method_id) = 2; }

    rpc AdvertisingAddress(AddressWithType) returns(Nothing) { option(method_id) = 3; }

    rpc IdentityAddress(AddressWithType) returns(Nothing) { option(method_id) = 4; }


    rpc PairingSuccessfullyCompleted(Nothing) returns(Nothing) { option(method_id) = 5; }
    rpc PairingFailed(PairingStatus) returns(Nothing) { option(method_id) = 6; }


    rpc NumberOfBondsChanged(UInt32Value) returns(Nothing) { option(method_id) = 7; }

    rpc BondInformation(BondsStatus) returns(Nothing) { option(method_id) = 8; }
}

// ==================================================
// GAP CENTRAL
// ==================================================

message AuthenticationInfo
{
    uint32 passkey = 1;
    bool isNumericComparison = 2;
}

message SecurityModeAndLevel
{
    enum SecurityLevelEnum
    {
        none = 0;
        unauthenticatedPairing = 1;
        authenticatedPairing = 2;
        authenticatedPairingWithLE = 3;
    }

    enum SecurityModeEnum
    {
        mode1 = 0;
        mode2 = 1;
    }

    SecurityModeEnum mode = 1;
    SecurityLevelEnum level = 2;
}

message ConnectionParameters
{
    AddressWithType addressWithType = 1;
    uint32 initiatingTimeoutInMs = 2;
}

message DiscoveredDevice
{
    Address address = 1;
    AddressType addressType = 2;
    bytes data = 3 [(bytes_size) = 32];
    int32 rssi = 4;
    
    // deprecated isScanResponse in favour of advertisingEventType
    reserved 5;

    AdvertisingEventType advertisingEventType = 6;
}

message DeviceDiscoveryFilter
{
    enum Filter
    {
        none = 0;
        address = 1;

        // Filtering on contents of Manufacturer specific data
        advertisingData = 2; 
    }

    Filter filter = 1;
    bytes data = 2 [(bytes_size) = 32];
};

message BondListItem
{
    AddressWithType addressWithType = 1; // Identitity address
    bytes deviceName = 2 [(bytes_size) = 32]; // Device Name from Gap Service (not unique).
    bool isDeviceConnected = 3;
}

message BondList
{
    // Will be sorted by age, oldest -> newest.
    repeated BondListItem items = 1 [(array_size) = 32];
    uint32 maxBonds = 2;
}

// ==================================================
// GAP CENTRAL SERVICE DEFINITION
// ==================================================
// State constraints:
//  Unless otherwise specified, all methods are allowed in all link layer states.
//  Non-conformance may cause undefined behavior
// Callback constraints:
//  Unless otherwise specified, methods do not by default result in any callbacks on the response service
//  When a callback is specified for a method and only for that method, another call of the same method is not allowed until the callback has been received.
//  When a callback is specified for more than one method, any of the associated method calls is not allowed until the callback for the previous call has been received
//  Non-conformance may cause undefined behavior
// ==================================================
service GapCentral
{
    option (service_id) = 33;

    // TODO: Check for race conditions

    // ==================================================
    // CORE FEATURE SET
    // All servers must implement these methods  
    // ==================================================

    // Results in GapCentralResponse.CurrentState with current state
    rpc GetState(Nothing) returns (Nothing) { option (method_id) = 1; }

    // Allowed states: standby
    // Starts scanning for advertising peripheral devices using the given filter
    // Discovered devices will be reported via GapCentralResponse.DeviceDiscovered.
    // Results in GapCentralResponse.CurrentState with state scanning
    rpc StartDeviceDiscovery(DeviceDiscoveryFilter) returns (Nothing) { option (method_id) = 2; }

    // Allowed states: scanning
    // Stops scanning for advertising peripheral devices.
    // Can result in GapCentralResponse.CurrentState with state standby
    rpc StopDeviceDiscovery(Nothing) returns (Nothing) { option (method_id) = 3; }

    // Allowed states: standby
    // Initiates a connection to a peripheral device with the given address.
    // For successful connection establishment, state will follow: standby -> initiating -> connected
    // For failed connection establishment, state will follow: standby -> initiating -> standby
    // Results in GapCentralResponse.CurrentState
    rpc Connect(ConnectionParameters) returns (Nothing) { option (method_id) = 4; }

    // Allowed states: initiating
    // Cancels an ongoing connection attempt.
    // Results in GapCentralResponse.CurrentState with state standby
    rpc CancelConnect(Nothing) returns (Nothing) { option (method_id) = 5; }

    // Allowed states: connected
    // Terminates the current connection.
    // Results in GapCentralResponse.CurrentState with state standby
    rpc Disconnect(Nothing) returns (Nothing) { option (method_id) = 6; }

    // Allowed states: connected
    // 1. If there is a pre-existing bond, then the connection will be encrypted.
    // 2. If there is no pre-existing bond, then pairing, encrypting, and bonding (storing the keys) will take place.
    // During pairing, GapCentralResponse.AuthenticationRequired may be called if user interaction is required.
    // Results in GapCentralResponse.PairingCompleted (incl. if it failed)
    // Can result in GapCentralResponse.NumberOfBondsChanged or GapCentralResponse.CurrentState if device disconnected
    rpc PairAndBond(Nothing) returns (Nothing) { option (method_id) = 7; }

    // Allowed in link layer states: standby
    // Configures the security mode and level required for connections.
    // Must be set before connecting.
    rpc SetSecurityMode(SecurityModeAndLevel) returns (Nothing) { option (method_id) = 8; }

    // Allowed in link layer states: standby
    // Configures the I/O capabilities of this device, used to determine the pairing method.
    // Must be set before connecting.
    rpc SetIoCapabilities(IoCapabilities) returns (Nothing) { option (method_id) = 9; }

    // Allowed in link layer states: connected
    // Provides the passkey entered by the user in response to GapCentralResponse.AuthenticationRequired.
    // Only valid when AuthenticationInfo.isNumericComparison is false.
    // Results in GapCentralResponse.AuthenticatedWithPasskeyDone
    rpc AuthenticateWithPasskey(UInt32Value) returns (Nothing) { option (method_id) = 10; }

    // Allowed in link layer states: connected
    // Confirms or rejects the numeric comparison in response to GapCentralResponse.AuthenticationRequired.
    // Only valid when AuthenticationInfo.isNumericComparison is true.
    // Results in GapCentralResponse.ConfirmedNumericalComparisonDone
    rpc NumericComparisonConfirm(BoolValue) returns (Nothing) { option (method_id) = 11; }

    // Allowed in link layer states: standby
    // Removes all stored bonds.
    // Results in GapCentralResponse.NumberOfBondsChanged
    rpc RemoveAllBonds(Nothing) returns (Nothing) { option (method_id) = 12; }
  
    // Allowed in link layer states: standby
    // Removes the bond associated with the given identity address.
    // Results in GapCentralResponse.NumberOfBondsChanged
    rpc RemoveBondWithAddress(AddressWithType) returns (Nothing) { option (method_id) = 13; }

    // Allowed in link layer states: standby, initiating, connected
    // Resolves a resolvable private address to the identity address of a bonded device.
    // Will only succeed if the address is a resolvable private address and the device is bonded.
    // Results in GapCentralResponse.ResolvedPrivateAddress on success, or GapCentralResponse.ResolvePrivateAddressFailed on failure.
    rpc ResolvePrivateAddress(Address) returns (Nothing) { option (method_id) = 14; }

    // Allowed in link layer states: standby, initiating, connected
    // Returns the list of bonded devices including their identity address and device name, sorted oldest to newest.
    // Results in GapCentralResponse.BondList
    rpc GetBondList(Nothing) returns (Nothing) { option (method_id) = 15; }
}

service GapCentralResponse {
    option(service_id) = 35;

    rpc CurrentState(State) returns (Nothing) { option (method_id) = 1; }
    rpc DeviceDiscovered(DiscoveredDevice) returns (Nothing) { option (method_id) = 2; }
    
    rpc PairingCompleted(PairingStatus) returns (Nothing) { option (method_id) = 3; }
    rpc AuthenticatedWithPasskeyDone(Nothing) returns (Nothing) { option (method_id) = 4; }
    rpc ConfirmedNumericalComparisonDone(Nothing) returns (Nothing) { option (method_id) = 5; }

    rpc ResolvedPrivateAddress(Address) returns (Nothing) { option (method_id) = 6; }
    rpc ResolvePrivateAddressFailed(Nothing) returns (Nothing) { option (method_id) = 7; }
    
    rpc NumberOfBondsChanged(UInt32Value) returns (Nothing) { option (method_id) = 8; }
    rpc BondList(BondList) returns (Nothing) { option(method_id) = 9; }
    rpc AuthenticationRequired(AuthenticationInfo) returns (Nothing) { option (method_id) = 10; }
}
